<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #172033;
        background: linear-gradient(135deg, #eff6ff, #cffafe);
      }

      main {
        display: flex;
        min-height: 100vh;
        align-items: flex-start;
        justify-content: center;
        padding: 64px 16px;
      }

      .shell {
        width: min(100%, 640px);
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        color: #1e3a8a;
        font-size: clamp(40px, 7vw, 56px);
        line-height: 1;
      }

      p {
        color: #475569;
        font-size: 18px;
      }

      form {
        display: flex;
        gap: 12px;
        margin: 32px auto 0;
      }

      input,
      button {
        border: 0;
        border-radius: 10px;
        font: inherit;
      }

      input {
        min-width: 0;
        flex: 1;
        padding: 14px 16px;
        color: #1f2937;
        box-shadow: 0 10px 30px rgb(15 23 42 / 0.12);
      }

      button {
        background: #2563eb;
        color: white;
        cursor: pointer;
        font-weight: 700;
        padding: 14px 24px;
      }

      button:disabled {
        cursor: progress;
        opacity: 0.7;
      }

      .message {
        margin-top: 24px;
        border-radius: 10px;
        padding: 16px;
      }

      .error {
        border: 1px solid #fecaca;
        background: #fef2f2;
        color: #b91c1c;
      }

      .card {
        margin: 28px auto 0;
        max-width: 420px;
        border-radius: 24px;
        background: white;
        padding: 28px;
        text-align: left;
        box-shadow: 0 24px 60px rgb(15 23 42 / 0.16);
      }

      .card h2 {
        margin: 0;
        color: #1f2937;
        font-size: 32px;
      }

      .description {
        margin: 4px 0 20px;
        text-transform: capitalize;
      }

      .temperature {
        margin: 0 0 24px;
        color: #2563eb;
        font-size: 72px;
        font-weight: 300;
        line-height: 1;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        border-top: 1px solid #e2e8f0;
        padding-top: 18px;
        text-align: center;
      }

      .stats span {
        display: block;
        color: #94a3b8;
        font-size: 13px;
      }

      .stats strong {
        color: #334155;
      }

      @media (max-width: 560px) {
        form {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell">
        <h1>Weather Dashboard</h1>
        <p>Search any city in the world</p>

        <form id="weather-form">
          <input id="city-input" type="text" placeholder="Enter a city..." />
          <button id="search-button" type="submit">Search</button>
        </form>

        <div id="message"></div>
        <div id="result"></div>
      </section>
    </main>

    <script>
      const form = document.querySelector("#weather-form");
      const input = document.querySelector("#city-input");
      const button = document.querySelector("#search-button");
      const message = document.querySelector("#message");
      const result = document.querySelector("#result");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const city = input.value.trim();
        if (!city) return;

        button.disabled = true;
        button.textContent = "Searching...";
        message.textContent = "";
        message.className = "";
        result.innerHTML = "";

        try {
          const response = await fetch(
            `/api/weather?city=${encodeURIComponent(city)}`,
          );
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.message || "Unable to fetch weather data.");
          }

          result.innerHTML = `
            <article class="card">
              <img src="https://openweathermap.org/img/wn/${data.icon}@2x.png" alt="${data.description}" width="80" height="80" />
              <h2>${data.city}</h2>
              <p class="description">${data.description}</p>
              <p class="temperature">${data.temp}&deg;F</p>
              <div class="stats">
                <div><span>Humidity</span><strong>${data.humidity}%</strong></div>
                <div><span>Wind</span><strong>${data.wind} mph</strong></div>
                <div><span>Feels Like</span><strong>${data.feelsLike}&deg;F</strong></div>
              </div>
            </article>
          `;
        } catch (error) {
          message.className = "message error";
          message.textContent = error.message;
        } finally {
          button.disabled = false;
          button.textContent = "Search";
        }
      });
    </script>
  </body>
</html>
